          <div class="dns-empty-icon">📊</div>
          <div class="dns-empty-text">Sẵn sàng tra cứu bản ghi DNS...</div>
          <div class="dns-empty-subtext">Được hỗ trợ bởi DPS.MEDIA</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="dns-footer">
      <div class="dns-footer-content">
        <span>Phát triển bởi</span>
        <strong class="dns-footer-brand">DPS.MEDIA</strong>
        <span>•</span>
        <span>Công cụ số chuyên nghiệp</span>
        <span>•</span>
        <a href="https://dps.media" target="_blank" class="dns-footer-link">dps.media</a>
      </div>
    </div>
  </div>`;

  const ta = root.querySelector('#dns-lines');
  const btnRun = root.querySelector('#dns-run');
  const btnStop = root.querySelector('#dns-stop');
  const btnClear = root.querySelector('#dns-clear');
  const typesWrap = root.querySelector('#dns-types');
  const statusEl = root.querySelector('#dns-status');
  const errorEl = root.querySelector('#dns-error');
  const errorTextEl = root.querySelector('#dns-error-text');
  const resultsEl = root.querySelector('#dns-results');
  const delayInput = root.querySelector('#dns-delay');
  const btnCopy = root.querySelector('#dns-copy-table');
  const countEl = root.querySelector('#dns-count');
  const progressEl = root.querySelector('#dns-progress');
  const progressBarEl = root.querySelector('#dns-progress-bar');
  const runTextEl = root.querySelector('#run-text');

  // Type pills với DPS branding
  const TYPE_LABELS = {
    'ALL': 'TẤT CẢ',
    'A': 'A', 
    'CNAME': 'CNAME',
    'MX': 'MX',
    'NS': 'NS',
    'TXT': 'TXT'
  };

  let activeType = 'A';
  RECORDS.forEach(t => {
    const b = document.createElement('button');
    b.textContent = TYPE_LABELS[t] || t;
    b.className = 'dns-type-btn';
    if (t === activeType) {
      b.classList.add('active');
    }
    
    b.addEventListener('click',()=>{
      if (isRunning) return;
      activeType = t;
      [...typesWrap.children].forEach(c => c.classList.remove('active'));
      b.classList.add('active');
    });
    typesWrap.appendChild(b);
  });

  // Domain count tracker với DPS colors
  function updateDomainCount() {
    const domains = ta.value.split(/\r?\n/)
      .map(s=>extractHostname(s))
      .filter(Boolean);
    countEl.textContent = `${domains.length} tên miền`;
    
    if (domains.length > 100) {
      countEl.style.background = 'rgba(220,38,38,0.9) !important';
      countEl.style.color = 'white !important';
    } else if (domains.length > 50) {
      countEl.style.background = 'rgba(245,158,11,0.9) !important';
      countEl.style.color = 'white !important';
    } else if (domains.length > 0) {
      countEl.style.background = 'rgba(50,181,97,0.9) !important';
      countEl.style.color = 'white !important';
    } else {
      countEl.style.background = 'rgba(21,21,119,0.9) !important';
      countEl.style.color = 'white !important';
    }
  }

  ta.addEventListener('input', updateDomainCount);
  updateDomainCount();

  function clampDelay(){
    let v = Number(delayInput.value || 0);
    if (!Number.isFinite(v) || v < 50){
      v = 50;
      delayInput.value = String(v);
      setStatus('⚠️ Độ trễ đã được đặt tối thiểu: 50ms');
    }
    return v;
  }
  delayInput.addEventListener('input', clampDelay);
  delayInput.addEventListener('blur', clampDelay);
  delayInput.addEventListener('keydown', (e)=>{
    if (e.key === '-') e.preventDefault();
  });

  function extractHostname(input){
    if(!input) return '';
    try{ return new URL(input).hostname.replace(/\.$/,''); }
    catch(e){ return String(input).trim().replace(/^https?:\/\//i,'').replace(/^\/*/,'').split('/')[0].split('?')[0].replace(/\.$/,''); }
  }

  function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

  function clearError(){ 
    errorEl.style.display='none'; 
    errorTextEl.textContent=''; 
  }
  function showError(msg){ 
    errorEl.style.display='flex'; 
    errorTextEl.textContent=msg; 
  }
  function setStatus(msg){ 
    statusEl.textContent = msg; 
  }

  function updateProgress(current, total) {
    if (total === 0) {
      progressEl.style.display = 'none';
      return;
    }
    progressEl.style.display = 'block';
    const percentage = Math.min((current / total) * 100, 100);
    progressBarEl.style.width = `${percentage}%`;
  }

  // Render table với DPS branding - Sử dụng div thay vì table elements
  function ensureTable(){
    if(resultsEl.firstChild && resultsEl.firstChild.classList && resultsEl.firstChild.classList.contains('dns-table')) return resultsEl.firstChild;
    resultsEl.innerHTML = '';
    const table = document.createElement('div');
    table.className = 'dns-table';
    
    const isMobile = window.innerWidth < 768;
    table.innerHTML = `<div class="dns-table-header-row">
      <div class="dns-table-header">Tên Miền</div>
      <div class="dns-table-header center">Loại</div>
      <div class="dns-table-header ${isMobile ? 'mobile-hidden' : ''}">Tên</div>
      <div class="dns-table-header center">TTL</div>
      <div class="dns-table-header">Dữ Liệu</div>
    </div><div class="dns-table-body"></div>`;
    resultsEl.appendChild(table);
    return table;
  }

  const allRows = [];
  function appendRows(rows){
    const table = ensureTable();
    const tbody = table.querySelector('.dns-table-body');
    const frag = document.createDocumentFragment();
    const isMobile = window.innerWidth < 768;
    
    rows.forEach((r, i) => {
      allRows.push(r);
      const tr = document.createElement('div');
      tr.className = 'dns-table-row';
      
      let dataColor = '#374151';
      if (r.data === '(không có dữ liệu)') dataColor = '#9ca3af';
      else if (r.data && r.data.startsWith('Lỗi:')) dataColor = '#dc2626';
      
      tr.innerHTML = `<div class="dns-table-cell">${r.domain}</div>
        <div class="dns-table-cell center type">${r.type}</div>
        <div class="dns-table-cell name ${isMobile ? 'mobile-hidden' : ''}">${r.name||''}</div>
        <div class="dns-table-cell center ttl">${r.ttl??''}</div>
        <div class="dns-table-cell data" style="color:${dataColor}">${r.data||''}</div>`;
      frag.appendChild(tr);
    });
    tbody.appendChild(frag);
    
    btnCopy.disabled = false;
    btnCopy.classList.remove('success');
  }

  async function queryDoH(domain, type){
    const base = 'https://dns.google/resolve';
    const params = new URLSearchParams();
    params.set('name', domain);
    params.set('type', TYPE_CODE[type]);
    const url = `${base}?${params.toString()}`;
    const res = await fetch(url, { headers: { 'Accept':'application/json' }});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }

  let abortFlag = false;
  let isRunning = false;

  btnStop.addEventListener('click', ()=>{ 
    abortFlag = true; 
    setStatus('🛑 Đang dừng...'); 
  });

  btnClear.addEventListener('click', () => {
    if (isRunning) return;
    resultsEl.innerHTML = `<div class="dns-empty-state">
      <div class="dns-empty-icon">📊</div>
      <div class="dns-empty-text">Sẵn sàng tra cứu bản ghi DNS...</div>
      <div class="dns-empty-subtext">Được hỗ trợ bởi DPS.MEDIA</div>
    </div>`;
    allRows.length = 0;
    btnCopy.disabled = true;
    btnCopy.classList.remove('success');
    clearError();
    setStatus('');
    progressEl.style.display = 'none';
  });

  btnRun.addEventListener('click', async ()=>{
    if (isRunning) return;
    
    clearError(); 
    allRows.length = 0; 
    abortFlag = false;
    isRunning = true;

    btnRun.disabled = true;
    runTextEl.textContent = '⏳ Đang chạy...';
    btnStop.style.display = 'block';
    btnClear.style.display = 'none';
    
    [...typesWrap.children].forEach(b => {
      b.style.cursor = 'not-allowed';
      b.style.opacity = '0.6';
    });

    const delay = clampDelay();

    const domains = ta.value.split(/\r?\n/)
      .map(s=>extractHostname(s))
      .filter(Boolean);

    if (!domains.length){ 
      showError('Vui lòng nhập ít nhất 1 tên miền.'); 
      resetUIState();
      return; 
    }
    if (domains.length > 100){ 
      showError('Giới hạn 100 tên miền mỗi lần để tránh quá tải. Hãy chia nhỏ danh sách.'); 
      resetUIState();
      return; 
    }

    const types = (activeType==='ALL') ? [...POPULAR] : [activeType];
    const totalQueries = domains.length * types.length;

    resultsEl.innerHTML = '';
    ensureTable();

    let completed = 0;
    for (let i=0; i<domains.length && !abortFlag; i++){
      const d = domains[i];
      for (const t of types){
        if (abortFlag) break;
        try{
          setStatus(`🔍 ${d} [${t}] (${completed + 1}/${totalQueries})`);
          updateProgress(completed, totalQueries);
          
          const json = await queryDoH(d, t);
          if (json && Array.isArray(json.Answer) && json.Answer.length > 0){
            const rows = json.Answer.map(a=>({ domain:d, type:t, name:a.name, ttl:a.TTL, data:a.data }));
            appendRows(rows);
          } else if (json && Array.isArray(json.Authority) && json.Authority.length > 0){
            const rows = json.Authority.map(a=>({ domain:d, type:t, name:a.name, ttl:a.TTL, data:a.data }));
            appendRows(rows);
          } else {
            appendRows([{ domain:d, type:t, name:'', ttl:'', data:'(không có dữ liệu)' }]);
          }
        }catch(e){
          appendRows([{ domain:d, type:t, name:'', ttl:'', data:`Lỗi: ${e.message}` }]);
        }
        completed++;
        updateProgress(completed, totalQueries);
        if (completed < totalQueries && !abortFlag) {
          await sleep(delay);
        }
      }
    }
    
    if (abortFlag) {
      setStatus(`⏹️ Đã dừng (${completed}/${totalQueries})`);
    } else {
      setStatus(`✅ Hoàn thành! ${allRows.length} bản ghi từ ${domains.length} tên miền`);
    }
    
    resetUIState();
  });

  function resetUIState() {
    isRunning = false;
    btnRun.disabled = false;
    runTextEl.textContent = '🚀 Bắt Đầu';
    btnStop.style.display = 'none';
    btnClear.style.display = 'block';
    progressEl.style.display = 'none';
    
    [...typesWrap.children].forEach(b => {
      b.style.cursor = 'pointer';
      b.style.opacity = '1';
    });
  }

  function escapeCell(v){
    if (v == null) return '';
    const s = String(v);
    return s.replace(/\t/g, ' ').replace(/\r?\n/g, ' ');
  }
  function rowsToTSV(rows){
    const header = ['Tên Miền','Loại','Tên','TTL','Dữ Liệu'];
    const lines = [header.join('\t')].concat(rows.map(r => [r.domain, r.type, r.name||'', r.ttl??'', r.data||''].map(escapeCell).join('\t')));
    return lines.join('\n');
  }
  async function copyText(text){
    if (navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    }
  }
  btnCopy.addEventListener('click', async ()=>{
    if (!allRows.length){ setStatus('❌ Không có dữ liệu để sao chép.'); return; }
    try{
      await copyText(rowsToTSV(allRows));
      setStatus('✅ Đã sao chép bảng vào clipboard!');
      
      const originalText = btnCopy.textContent;
      btnCopy.textContent = '✅ Đã sao chép!';
      btnCopy.classList.add('success');
      
      setTimeout(() => {
        btnCopy.textContent = originalText;
        btnCopy.classList.remove('success');
      }, 2000);
    }catch(e){ 
      setStatus('❌ Sao chép thất bại: ' + e.message); 
    }
  });

  // Window resize handler
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      if (resultsEl.firstChild && resultsEl.firstChild.classList && resultsEl.firstChild.classList.contains('dns-table')) {
        const currentRows = [...allRows];
        allRows.length = 0;
        resultsEl.innerHTML = '';
        if (currentRows.length > 0) {
          appendRows(currentRows);
        }
      }
    }, 100);
  });

  // Initialize copy button state
  btnCopy.disabled = true;
})();
</script>
<!-- End DNS Bulk Lookup Widget - DPS.MEDIA -->
